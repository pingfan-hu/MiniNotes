<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --scrollbar: #cccccc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #d4d4d4;
                --scrollbar: #555555;
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body, #editor {
            height: 100%;
            background: var(--bg);
            color: var(--text);
        }

        /* CodeMirror scroll container */
        .cm-editor {
            height: 100%;
            background: var(--bg);
        }
        .cm-scroller {
            color: var(--text);
        }
        .cm-scroller::-webkit-scrollbar { width: 6px; }
        .cm-scroller::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 3px;
        }

        /* Dark mode heading dim color */
        @media (prefers-color-scheme: dark) {
            .lp-syntax-dim { color: #666 !important; }
        }
    </style>
</head>
<body>
<div id="editor"></div>

<script src="editor-bundle.js"></script>
<script>
    const view = setupEditor("", function(content) {
        if (window.webkit?.messageHandlers?.contentChanged) {
            window.webkit.messageHandlers.contentChanged.postMessage(content)
        }
    })
</script>
</body>
</html>
