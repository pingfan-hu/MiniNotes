name: MiniNotes
options:
  bundleIdPrefix: com.pingfan
  deploymentTarget:
    macOS: "13.0"

targets:
  MiniNotes:
    type: application
    platform: macOS
    sources:
      - path: MiniNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pingfan.MiniNotes
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: "NO"
    info:
      path: MiniNotes/Info.plist
      properties:
        CFBundleDisplayName: MiniNotes
        CFBundleName: MiniNotes
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: YES
        NSPrincipalClass: NSApplication
