name: MiniNotes
options:
  bundleIdPrefix: com.pingfan
  deploymentTarget:
    macOS: "13.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

targets:
  MiniNotes:
    type: application
    platform: macOS
    sources:
      - path: MiniNotes
    dependencies:
      - package: Sparkle
        product: Sparkle
      - sdk: Carbon.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pingfan.MiniNotes
        MARKETING_VERSION: "0.1.2"
        CURRENT_PROJECT_VERSION: "0.1.2"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MiniNotes/Info.plist
      properties:
        CFBundleDisplayName: MiniNotes
        CFBundleName: MiniNotes
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: YES
        NSPrincipalClass: NSApplication
        SUFeedURL: "https://raw.githubusercontent.com/pingfan-hu/MiniNotes/main/appcast.xml"
        SUPublicEDKey: "opaYYNjjYgCQJ7jkDvI/eBoF3lfZJ5+qwaMFT20VE+k="
